<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ct-analyzer Login</title>
    <link rel="stylesheet" href="/ui/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">Admin Access</p>
        <h1>Sign in to the reporting UI</h1>
        <p class="hero-copy">UI access uses a secure session cookie. API and MCP clients continue to use bearer API keys.</p>
        <form method="post" action="/login" class="login-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="submit">Sign In</button>
        </form>
        <p id="login-error" class="auth-status" hidden>Invalid username or password.</p>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("error") === "1") {
        const error = document.getElementById("login-error");
        error.hidden = false;
        error.dataset.kind = "error";
      }
    </script>
  </body>
</html>
